<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMQ Incorrect Guesses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5f5f5;
      --surface:     #fff;
      --border:      #e0e0e0;
      --border-sub:  #f2f2f2;
      --text:        #222;
      --text-sub:    #555;
      --text-muted:  #888;
      --text-dim:    #bbb;
      --input-bg:    #fafafa;
      --input-focus: #fff;
      --input-border:#d0d0d0;
      --hover-row:   #fafafa;
      --btn-bg:      #222;
      --btn-hover:   #444;
      --track-off:   #ccc;
      --track-on:    #222;
      --knob:        #fff;
      --bar-color:   #222;
      --sidebar-w:   220px;
    }

    body.dark {
      --bg:          #181818;
      --surface:     #222;
      --border:      #333;
      --border-sub:  #2a2a2a;
      --text:        #e8e8e8;
      --text-sub:    #aaa;
      --text-muted:  #666;
      --text-dim:    #444;
      --input-bg:    #1c1c1c;
      --input-focus: #242424;
      --input-border:#3a3a3a;
      --hover-row:   #292929;
      --btn-bg:      #e8e8e8;
      --btn-hover:   #ccc;
      --track-off:   #444;
      --track-on:    #e8e8e8;
      --knob:        #181818;
      --bar-color:   #e8e8e8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.2s, border-color 0.2s;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .last-updated { font-size: 0.75rem; color: var(--text-muted); text-align: right; }
    .last-updated span { display: block; font-weight: 500; color: var(--text-sub); margin-top: 2px; }

    .dark-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-sub);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s, background 0.2s;
      white-space: nowrap;
    }
    .dark-toggle:hover { border-color: var(--text-sub); color: var(--text); }
    .dark-toggle .icon { font-size: 0.9rem; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      align-items: flex-start;
      min-height: calc(100vh - 57px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      min-height: calc(100vh - 57px);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: background 0.2s, border-color 0.2s;
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .preset-form { display: flex; flex-direction: column; gap: 6px; }

    .preset-form input {
      border: 1px solid var(--input-border);
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      width: 100%;
      transition: border-color 0.15s, background 0.2s;
    }
    .preset-form input:focus { border-color: var(--text-sub); background: var(--input-focus); }
    .preset-form input::placeholder { color: var(--text-dim); }

    .preset-form input[type="number"] {
      padding: 6px 8px;
      font-size: 0.8rem;
    }

    .preset-add-btn {
      background: var(--btn-bg);
      color: var(--surface);
      border: none;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .preset-add-btn:hover { background: var(--btn-hover); }

    .preset-divider { height: 1px; background: var(--border); }

    .preset-list { display: flex; flex-direction: column; gap: 4px; }

    .preset-empty {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      padding: 12px 4px;
    }

    .preset-item {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 6px;
      padding: 7px 8px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .preset-item:hover { background: var(--hover-row); }
    .preset-item.active { background: var(--border-sub); }

    .preset-info { flex: 1; min-width: 0; }
    .preset-name {
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preset-id { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

    .preset-delete {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
      opacity: 0;
    }
    .preset-item:hover .preset-delete { opacity: 1; }
    .preset-delete:hover { color: #e05252; background: rgba(224,82,82,0.08); }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 24px;
      min-width: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      transition: background 0.2s, border-color 0.2s;
      max-width: 680px;
    }

    .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
    label { font-size: 0.75rem; font-weight: 500; color: var(--text-sub); }

    input[type="number"] {
      border: 1px solid var(--input-border);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.15s, background 0.2s, color 0.2s;
    }
    input[type="number"]:focus { border-color: var(--text-sub); background: var(--input-focus); }

    .btn {
      background: var(--btn-bg);
      color: var(--surface);
      border: none;
      border-radius: 5px;
      padding: 9px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: var(--btn-hover); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-sub);
    }

    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { display: none; }
    .track {
      position: absolute; inset: 0;
      background: var(--track-off);
      border-radius: 99px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .switch input:checked ~ .track { background: var(--track-on); }
    .knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--knob);
      border-radius: 50%;
      transition: left 0.2s;
      pointer-events: none;
    }
    .switch input:checked ~ .knob { left: 19px; }

    .toggle-label { font-size: 0.82rem; color: var(--text-sub); cursor: pointer; user-select: none; }

    #status {
      font-size: 0.78rem;
      color: var(--text-muted);
      min-height: 1.2em;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      max-width: 680px;
    }
    #status.error { color: #c0392b; }
    #status.ok    { color: #27ae60; }

    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--text-sub);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.on { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-meta { display: none; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
    .results-meta.on { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    thead th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    thead th:last-child { text-align: right; }

    tbody tr { border-bottom: 1px solid var(--border-sub); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--hover-row); }

    td { padding: 9px 12px; }
    td.rank  { color: var(--text-dim); font-size: 0.75rem; width: 40px; }
    td.mid   { font-weight: 500; }
    td.mid a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.15s; }
    td.mid a:hover { border-bottom-color: var(--text); }
    td.count { text-align: right; color: var(--text-sub); }

    .bar-wrap { display: inline-flex; align-items: center; gap: 8px; float: right; }
    .bar { height: 3px; background: var(--bar-color); border-radius: 99px; opacity: 0.15; }

    .empty { text-align: center; color: var(--text-muted); padding: 28px; font-size: 0.85rem; }

    .tab-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tab-btn:hover { border-color: var(--text-sub); color: var(--text); }
    .tab-btn.active {
      background: var(--btn-bg);
      border-color: var(--btn-bg);
      color: var(--surface);
    }

    @media (max-width: 600px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; min-height: unset; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>EMQ Incorrect Guesses</h1>
    <p>step 1 to fixing skill issue</p>
  </div>
  <div class="header-right">
    <div class="last-updated">
      Last updated
      <span>March 20, 2026</span>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">
      <span class="icon">🌙</span> Dark
    </button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Presets</div>

    <div class="preset-form">
      <input type="text"   id="presetName" placeholder="Name" maxlength="32" />
      <input type="number" id="presetId"   placeholder="Player ID" min="1" />
      <button class="preset-add-btn" onclick="addPreset()">+ Add preset</button>
    </div>

    <div class="preset-divider"></div>

    <div class="preset-list" id="presetList">
      <div class="preset-empty" id="presetEmpty">No presets yet.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="card">
      <div class="row">
        <div class="field">
          <label for="playerId">Player ID</label>
          <input type="number" id="playerId" placeholder="27" min="1" />
        </div>
        <div class="field" style="max-width:100px">
          <label for="limitVal">Limit</label>
          <input type="number" id="limitVal" value="20" min="1" max="100" />
        </div>
        <button class="btn" onclick="runQuery()">Search</button>
      </div>

      <div class="toggle-row">
        <label class="switch">
          <input type="checkbox" id="neverCorrect" onchange="rerenderIfLoaded()" />
          <span class="track"></span>
          <span class="knob"></span>
        </label>
        <span class="toggle-label" onclick="document.getElementById('neverCorrect').click()">
          Only include songs the player has never guessed correctly
        </span>
      </div>
    </div>

    <!-- Section tabs -->
    <div style="display:flex;gap:8px;margin-bottom:16px;max-width:680px">
      <button class="tab-btn active" id="tabSong" onclick="switchTab('song')">🎵 Song Guesses</button>
      <button class="tab-btn" id="tabArtist" onclick="switchTab('artist')">🎤 Artist Guesses</button>
    </div>

    <div id="status">
      <span class="spinner" id="spinner"></span>
      <span id="statusText">Enter a Player ID to begin.</span>
    </div>

    <div class="card" id="resultsCard" style="display:none">
      <div class="results-meta" id="resultsMeta"></div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Music ID</th>
            <th>Source Title</th>
            <th>Song Title</th>
            <th>Artist</th>
            <th>Incorrect / Total</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Artist results card -->
    <div class="card" id="artResultsCard" style="display:none">
      <div class="results-meta" id="artResultsMeta"></div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Artist ID</th>
            <th>Artist</th>
            <th>Incorrect / Total</th>
          </tr>
        </thead>
        <tbody id="artTbody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
  const $ = id => document.getElementById(id);
  let currentData = null;
  let activePresetId = null;
  let activeTab = 'song';

  function switchTab(tab) {
    activeTab = tab;
    $('tabSong').classList.toggle('active', tab === 'song');
    $('tabArtist').classList.toggle('active', tab === 'artist');
    if (currentData) {
      $('resultsCard').style.display    = tab === 'song'   ? 'block' : 'none';
      $('artResultsCard').style.display = tab === 'artist' ? 'block' : 'none';
      if (tab === 'artist') renderArtistResults();
      if (tab === 'song')   renderResults();
    }
  }

  // ── Dark mode ─────────────────────────────────────────────────────────
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let isDark = localStorage.getItem('dark') === 'true' || (localStorage.getItem('dark') === null && prefersDark);

  function applyDark() {
    document.body.classList.toggle('dark', isDark);
    $('darkBtn').innerHTML = isDark
      ? '<span class="icon">☀️</span> Light'
      : '<span class="icon">🌙</span> Dark';
  }
  function toggleDark() {
    isDark = !isDark;
    localStorage.setItem('dark', isDark);
    applyDark();
  }
  applyDark();

  // ── Presets ───────────────────────────────────────────────────────────
  function loadPresets() {
    return JSON.parse(localStorage.getItem('presets') || '[]');
  }
  function savePresets(presets) {
    localStorage.setItem('presets', JSON.stringify(presets));
  }

  function renderPresets() {
    const presets = loadPresets();
    const list  = $('presetList');
    const empty = $('presetEmpty');

    list.querySelectorAll('.preset-item').forEach(el => el.remove());

    if (presets.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    presets.forEach(({ id, name }) => {
      const item = document.createElement('div');
      item.className = 'preset-item' + (id === activePresetId ? ' active' : '');
      item.dataset.id = id;
      item.innerHTML = `
        <div class="preset-info">
          <div class="preset-name">${escHtml(name)}</div>
          <div class="preset-id">ID: ${id}</div>
        </div>
        <button class="preset-delete" onclick="deletePreset(event, ${id})" title="Remove">✕</button>
      `;
      item.addEventListener('click', () => loadPreset(id));
      list.appendChild(item);
    });
  }

  function addPreset() {
    const name = $('presetName').value.trim();
    const id   = parseInt($('presetId').value);
    if (!name) { $('presetName').focus(); return; }
    if (!id)   { $('presetId').focus();   return; }

    const presets = loadPresets();
    const existing = presets.find(p => p.id === id);
    if (existing) { existing.name = name; }
    else { presets.push({ id, name }); }

    savePresets(presets);
    $('presetName').value = '';
    $('presetId').value   = '';
    renderPresets();
  }

  function deletePreset(e, id) {
    e.stopPropagation();
    savePresets(loadPresets().filter(p => p.id !== id));
    if (activePresetId === id) activePresetId = null;
    renderPresets();
  }

  function loadPreset(id) {
    activePresetId = id;
    $('playerId').value = id;
    renderPresets();
    runQuery();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  renderPresets();

  $('presetName').addEventListener('keydown', e => { if (e.key === 'Enter') $('presetId').focus(); });
  $('presetId').addEventListener('keydown',   e => { if (e.key === 'Enter') addPreset(); });

  // ── Query ─────────────────────────────────────────────────────────────
  function setStatus(msg, type = '') {
    $('statusText').textContent = msg;
    $('status').className = type;
  }

  function setLoading(on) {
    $('spinner').className = on ? 'spinner on' : 'spinner';
    document.querySelector('.btn').disabled = on;
  }

  async function runQuery() {
    const playerId = parseInt($('playerId').value);
    if (!playerId) { setStatus('Enter a valid Player ID.', 'error'); return; }

    setLoading(true);
    currentData = null;
    $('resultsCard').style.display = 'none';
    $('artResultsCard').style.display = 'none';
    setStatus(`Loading player ${playerId}…`);

    try {
      const res = await fetch(`data/${playerId}.json`);
      if (res.status === 404) throw new Error(`No data found for Player ID ${playerId}.`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      currentData = await res.json();
      renderResults();
      renderArtistResults();
    } catch (err) {
      setStatus(err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function rerenderIfLoaded() {
    if (currentData) { renderResults(); renderArtistResults(); }
  }

  let songsData = null;

  async function loadSongsData() {
    if (songsData) return songsData;
    try {
      const res = await fetch('data_songs/songs.json');
      if (res.ok) songsData = await res.json();
    } catch (_) {}
    return songsData;
  }

  let artistsData = null;

  async function loadArtistsData() {
    if (artistsData) return artistsData;
    try {
      const res = await fetch('data_artist/artists.json');
      if (res.ok) artistsData = await res.json();
    } catch (_) {}
    return artistsData;
  }

  async function renderResults() {
    const neverCorrect = $('neverCorrect').checked;
    const limit = Math.min(parseInt($('limitVal').value) || 100, 100);
    const rows  = (neverCorrect ? currentData.never_correct : currentData.incorrect).slice(0, limit);

    const presets = loadPresets();
    const preset  = presets.find(p => p.id === currentData.player_id);
    const label   = preset ? `${preset.name} (ID: ${currentData.player_id})` : `Player ${currentData.player_id}`;

    $('resultsMeta').textContent =
      `${label} · ${rows.length} result${rows.length !== 1 ? 's' : ''}` +
      (neverCorrect ? ' · never correct only' : '');
    $('resultsMeta').className = 'results-meta on';

    $('tbody').innerHTML = rows.length === 0
      ? `<tr><td colspan="5" class="empty">No results found.</td></tr>`
      : rows.map(({ music_id, instances, total }, i) => `
          <tr>
            <td class="rank">${i + 1}</td>
            <td class="mid"><a href="https://erogemusicquiz.com/em${music_id}" target="_blank" rel="noopener">${music_id}</a></td>
            <td class="title-cell" id="src-${music_id}" style="color:var(--text-muted);font-size:0.8rem">…</td>
            <td class="title-cell" id="sng-${music_id}" style="color:var(--text-muted);font-size:0.8rem">…</td>
            <td class="title-cell" id="art-${music_id}" style="color:var(--text-muted);font-size:0.8rem">…</td>
            <td class="count">
              <div class="bar-wrap">
                <span style="color:#e05252">${instances}</span><span style="color:var(--text-dim)">/${total}</span>
                <div style="display:flex;height:6px;border-radius:99px;overflow:hidden;width:60px;background:var(--border)">
                  <div style="width:${Math.round((instances / total) * 100)}%;background:#e05252"></div>
                  <div style="flex:1;background:#4caf7d"></div>
                </div>
              </div>
            </td>
          </tr>`
        ).join('');

    $('resultsCard').style.display = activeTab === 'song' ? 'block' : 'none';
    setStatus('Done.', 'ok');

    if (rows.length > 0) {
      const [songs, artists] = await Promise.all([loadSongsData(), loadArtistsData()]);
      for (const { music_id } of rows) {
        const t = songs?.[music_id];
        const srcEl = $(`src-${music_id}`);
        const sngEl = $(`sng-${music_id}`);
        if (srcEl) {
          const srcTitle = t?.s || null;
          srcEl.style.color = ''; srcEl.style.fontSize = '';
          if (srcTitle) {
            const vndbId = t?.v;
            const url = vndbId
              ? `https://vndb.org/v${vndbId}`
              : `https://vndb.org/v?q=${encodeURIComponent(srcTitle)}&sb=Search%21&ch=&f=&s=26w`;
            srcEl.innerHTML = `<a href="${url}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--text)'" onmouseout="this.style.borderColor='var(--border)'">${srcTitle}</a>`;
          } else {
            srcEl.textContent = '—';
          }
        }
        if (sngEl) { sngEl.textContent = t?.t || '—'; sngEl.style.color = ''; sngEl.style.fontSize = ''; }
        const artEl = $(`art-${music_id}`);
        if (artEl) {
          const entries = artists?.[music_id];
          artEl.style.color = ''; artEl.style.fontSize = '';
          if (entries && entries.length) {
            artEl.innerHTML = entries.map(a =>
              `<a href="https://erogemusicquiz.com/ea${a.i}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);transition:border-color 0.15s" onmouseover="this.style.borderColor='var(--text)'" onmouseout="this.style.borderColor='var(--border)'">${a.n}</a>`
            ).join(', ');
          } else {
            artEl.textContent = '—';
          }
        }
      }
    }
  }

  async function renderArtistResults() {
    if (!currentData) return;
    const neverCorrect = $('neverCorrect').checked;
    const limit = Math.min(parseInt($('limitVal').value) || 100, 100);
    const rows  = (neverCorrect ? currentData.art_never_correct : currentData.art_incorrect).slice(0, limit);

    const presets = loadPresets();
    const preset  = presets.find(p => p.id === currentData.player_id);
    const label   = preset ? `${preset.name} (ID: ${currentData.player_id})` : `Player ${currentData.player_id}`;

    $('artResultsMeta').textContent =
      `${label} · ${rows.length} result${rows.length !== 1 ? 's' : ''} · artist guesses` +
      (neverCorrect ? ' · never correct only' : '');
    $('artResultsMeta').className = 'results-meta on';

    $('artTbody').innerHTML = rows.length === 0
      ? `<tr><td colspan="4" class="empty">No artist guess data found.</td></tr>`
      : rows.map(({ artist_id, name, instances, total }, i) => `
          <tr>
            <td class="rank">${i + 1}</td>
            <td class="mid"><a href="https://erogemusicquiz.com/ea${artist_id}" target="_blank" rel="noopener">${artist_id}</a></td>
            <td class="mid">${name}</td>
            <td class="count">
              <div class="bar-wrap">
                <span style="color:#e05252">${instances}</span><span style="color:var(--text-dim)">/${total}</span>
                <div style="display:flex;height:6px;border-radius:99px;overflow:hidden;width:60px;background:var(--border)">
                  <div style="width:${Math.round((instances / total) * 100)}%;background:#e05252"></div>
                  <div style="flex:1;background:#4caf7d"></div>
                </div>
              </div>
            </td>
          </tr>`
        ).join('');

    // Always render data; visibility is controlled by switchTab and the search flow
    $('artResultsCard').style.display = activeTab === 'artist' ? 'block' : 'none';
  }

  $('playerId').addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });
</script>
<script src="last-updated.js"></script>
</body>
</html>
