<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMQ Incorrect Guesses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5f5f5;
      --surface:     #fff;
      --border:      #e0e0e0;
      --border-sub:  #f2f2f2;
      --text:        #222;
      --text-sub:    #555;
      --text-muted:  #888;
      --text-dim:    #bbb;
      --input-bg:    #fafafa;
      --input-focus: #fff;
      --input-border:#d0d0d0;
      --hover-row:   #fafafa;
      --btn-bg:      #222;
      --btn-hover:   #444;
      --track-off:   #ccc;
      --track-on:    #222;
      --knob:        #fff;
      --bar-color:   #222;
    }

    body.dark {
      --bg:          #181818;
      --surface:     #222;
      --border:      #333;
      --border-sub:  #2a2a2a;
      --text:        #e8e8e8;
      --text-sub:    #aaa;
      --text-muted:  #666;
      --text-dim:    #444;
      --input-bg:    #1c1c1c;
      --input-focus: #242424;
      --input-border:#3a3a3a;
      --hover-row:   #292929;
      --btn-bg:      #e8e8e8;
      --btn-hover:   #ccc;
      --track-off:   #444;
      --track-on:    #e8e8e8;
      --knob:        #181818;
      --bar-color:   #e8e8e8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: background 0.2s, border-color 0.2s;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .last-updated { font-size: 0.75rem; color: var(--text-muted); text-align: right; }
    .last-updated span { display: block; font-weight: 500; color: var(--text-sub); margin-top: 2px; }

    /* dark mode button */
    .dark-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-sub);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s, background 0.2s;
      white-space: nowrap;
    }
    .dark-toggle:hover { border-color: var(--text-sub); color: var(--text); }
    .dark-toggle .icon { font-size: 0.9rem; }

    /* container */
    .container { max-width: 700px; margin: 32px auto; padding: 0 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      transition: background 0.2s, border-color 0.2s;
    }

    .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }

    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }

    label { font-size: 0.75rem; font-weight: 500; color: var(--text-sub); }

    input[type="number"] {
      border: 1px solid var(--input-border);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.15s, background 0.2s, color 0.2s;
    }
    input:focus { border-color: var(--text-sub); background: var(--input-focus); }

    .btn {
      background: var(--btn-bg);
      color: var(--surface);
      border: none;
      border-radius: 5px;
      padding: 9px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: var(--btn-hover); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-sub);
    }

    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { display: none; }
    .track {
      position: absolute; inset: 0;
      background: var(--track-off);
      border-radius: 99px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .switch input:checked ~ .track { background: var(--track-on); }
    .knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--knob);
      border-radius: 50%;
      transition: left 0.2s;
      pointer-events: none;
    }
    .switch input:checked ~ .knob { left: 19px; }

    .toggle-label { font-size: 0.82rem; color: var(--text-sub); cursor: pointer; user-select: none; }

    #status {
      font-size: 0.78rem;
      color: var(--text-muted);
      min-height: 1.2em;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
    }
    #status.error { color: #c0392b; }
    #status.ok    { color: #27ae60; }

    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--text-sub);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.on { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-meta { display: none; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
    .results-meta.on { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    thead th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    thead th:last-child { text-align: right; }

    tbody tr { border-bottom: 1px solid var(--border-sub); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--hover-row); }

    td { padding: 9px 12px; }
    td.rank  { color: var(--text-dim); font-size: 0.75rem; width: 40px; }
    td.mid   { font-weight: 500; }
    td.mid a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.15s; }
    td.mid a:hover { border-bottom-color: var(--text); }
    td.count { text-align: right; color: var(--text-sub); }

    .bar-wrap { display: inline-flex; align-items: center; gap: 8px; float: right; }
    .bar { height: 3px; background: var(--bar-color); border-radius: 99px; opacity: 0.15; }

    .empty { text-align: center; color: var(--text-muted); padding: 28px; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>EMQ Incorrect Guesses</h1>
    <p>step 1 to fixing skill issue</p>
  </div>
  <div class="header-right">
    <div class="last-updated">
      Last updated
      <span>March 8, 2026</span>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">
      <span class="icon">🌙</span> Dark
    </button>
  </div>
</header>

<div class="container">
  <div class="card">
    <div class="row">
      <div class="field">
        <label for="playerId">Player ID</label>
        <input type="number" id="playerId" placeholder="27" min="1" />
      </div>
      <div class="field" style="max-width:100px">
        <label for="limitVal">Limit</label>
        <input type="number" id="limitVal" value="100" min="1" max="100" />
      </div>
      <button class="btn" onclick="runQuery()">Search</button>
    </div>

    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="neverCorrect" onchange="rerenderIfLoaded()" />
        <span class="track"></span>
        <span class="knob"></span>
      </label>
      <span class="toggle-label" onclick="document.getElementById('neverCorrect').click()">
        Exclude songs the player has ever guessed correctly
      </span>
    </div>
  </div>

  <div id="status">
    <span class="spinner" id="spinner"></span>
    <span id="statusText">Enter a Player ID to begin.</span>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="results-meta" id="resultsMeta"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Music ID</th>
          <th>Incorrect / Total</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let currentData = null;

  // ── Dark mode ─────────────────────────────────────────────────────────
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let isDark = localStorage.getItem('dark') === 'true' || (localStorage.getItem('dark') === null && prefersDark);

  function applyDark() {
    document.body.classList.toggle('dark', isDark);
    $('darkBtn').innerHTML = isDark
      ? '<span class="icon">☀️</span> Light'
      : '<span class="icon">🌙</span> Dark';
  }

  function toggleDark() {
    isDark = !isDark;
    localStorage.setItem('dark', isDark);
    applyDark();
  }

  applyDark();

  // ── Query ─────────────────────────────────────────────────────────────
  function setStatus(msg, type = '') {
    $('statusText').textContent = msg;
    $('status').className = type;
  }

  function setLoading(on) {
    $('spinner').className = on ? 'spinner on' : 'spinner';
    document.querySelector('.btn').disabled = on;
  }

  async function runQuery() {
    const playerId = parseInt($('playerId').value);
    if (!playerId) { setStatus('Enter a valid Player ID.', 'error'); return; }

    setLoading(true);
    currentData = null;
    $('resultsCard').style.display = 'none';
    setStatus(`Loading player ${playerId}…`);

    try {
      const res = await fetch(`data/${playerId}.json`);
      if (res.status === 404) throw new Error(`No data found for Player ID ${playerId}.`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      currentData = await res.json();
      renderResults();
    } catch (err) {
      setStatus(err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function rerenderIfLoaded() {
    if (currentData) renderResults();
  }

  function renderResults() {
    const neverCorrect = $('neverCorrect').checked;
    const limit = Math.min(parseInt($('limitVal').value) || 100, 100);
    const rows = (neverCorrect ? currentData.never_correct : currentData.incorrect).slice(0, limit);

    $('resultsMeta').textContent =
      `Player ${currentData.player_id} · ${rows.length} result${rows.length !== 1 ? 's' : ''}` +
      (neverCorrect ? ' · never correct only' : '');
    $('resultsMeta').className = 'results-meta on';

    const max = rows.length > 0 ? rows[0].instances : 1;

    $('tbody').innerHTML = rows.length === 0
      ? `<tr><td colspan="3" class="empty">No results found.</td></tr>`
      : rows.map(({ music_id, instances, total }, i) => `
          <tr>
            <td class="rank">${i + 1}</td>
            <td class="mid"><a href="https://erogemusicquiz.com/em${music_id}" target="_blank" rel="noopener">${music_id}</a></td>
            <td class="count">
              <div class="bar-wrap">
                <span style="color:#e05252">${instances}</span><span style="color:var(--text-dim)">/${total}</span>
                <div style="display:flex;height:6px;border-radius:99px;overflow:hidden;width:60px;background:var(--border)">
                  <div style="width:${Math.round((instances / total) * 100)}%;background:#e05252"></div>
                  <div style="flex:1;background:#4caf7d"></div>
                </div>
              </div>
            </td>
          </tr>`
        ).join('');

    $('resultsCard').style.display = 'block';
    setStatus('Done.', 'ok');
  }

  $('playerId').addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });
</script>
</body>
</html>
