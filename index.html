<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incorrect Guesses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
    }

    header p {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    .container {
      max-width: 700px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 120px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #555;
    }

    input[type="number"] {
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #555; background: #fff; }

    .btn {
      background: #222;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 9px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { background: #444; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0f0f0;
    }

    /* toggle switch */
    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { display: none; }
    .track {
      position: absolute; inset: 0;
      background: #ccc;
      border-radius: 99px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .switch input:checked ~ .track { background: #222; }
    .knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
      pointer-events: none;
    }
    .switch input:checked ~ .knob { left: 19px; }

    .toggle-label { font-size: 0.82rem; color: #555; cursor: pointer; user-select: none; }

    /* status */
    #status {
      font-size: 0.78rem;
      color: #888;
      min-height: 1.2em;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
    }
    #status.error { color: #c0392b; }
    #status.ok    { color: #27ae60; }

    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid #ddd;
      border-top-color: #444;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.on { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* results */
    .results-meta {
      display: none;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 10px;
    }
    .results-meta.on { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      padding: 8px 12px;
      border-bottom: 1px solid #e8e8e8;
    }

    thead th:last-child { text-align: right; }

    tbody tr { border-bottom: 1px solid #f2f2f2; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    td { padding: 9px 12px; }

    td.rank  { color: #bbb; font-size: 0.75rem; width: 40px; }
    td.mid   { font-weight: 500; }
    td.count { text-align: right; color: #555; }

    .bar-wrap { display: inline-flex; align-items: center; gap: 8px; float: right; }
    .bar {
      height: 3px;
      background: #222;
      border-radius: 99px;
      opacity: 0.15;
    }

    .empty { text-align: center; color: #aaa; padding: 28px; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>Incorrect Guesses</h1>
  <p>Quiz song history lookup</p>
</header>

<div class="container">
  <div class="card">
    <div class="row">
      <div class="field">
        <label for="playerId">Player ID</label>
        <input type="number" id="playerId" placeholder="27" min="1" />
      </div>
      <div class="field" style="max-width:100px">
        <label for="limitVal">Limit</label>
        <input type="number" id="limitVal" value="100" min="1" max="1000" />
      </div>
      <button class="btn" onclick="runQuery()">Search</button>
    </div>

    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="neverCorrect" onchange="rerenderIfLoaded()" />
        <span class="track"></span>
        <span class="knob"></span>
      </label>
      <span class="toggle-label" onclick="document.getElementById('neverCorrect').click()">
        Exclude songs the player has ever guessed correctly
      </span>
    </div>
  </div>

  <div id="status">
    <span class="spinner" id="spinner"></span>
    <span id="statusText">Enter a Player ID to begin.</span>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="results-meta" id="resultsMeta"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Music ID</th>
          <th>Incorrect Guesses</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let currentData = null;

  function setStatus(msg, type = '') {
    $('statusText').textContent = msg;
    $('status').className = type;
  }

  function setLoading(on) {
    $('spinner').className = on ? 'spinner on' : 'spinner';
    document.querySelector('.btn').disabled = on;
  }

  async function runQuery() {
    const playerId = parseInt($('playerId').value);
    if (!playerId) { setStatus('Enter a valid Player ID.', 'error'); return; }

    setLoading(true);
    currentData = null;
    $('resultsCard').style.display = 'none';
    setStatus(`Loading player ${playerId}…`);

    try {
      const res = await fetch(`data/${playerId}.json`);
      if (res.status === 404) throw new Error(`No data found for Player ID ${playerId}.`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      currentData = await res.json();
      renderResults();
    } catch (err) {
      setStatus(err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function rerenderIfLoaded() {
    if (currentData) renderResults();
  }

  function renderResults() {
    const neverCorrect = $('neverCorrect').checked;
    const limit = parseInt($('limitVal').value) || 100;
    const rows = (neverCorrect ? currentData.never_correct : currentData.incorrect).slice(0, limit);

    $('resultsMeta').textContent =
      `Player ${currentData.player_id} · ${rows.length} result${rows.length !== 1 ? 's' : ''}` +
      (neverCorrect ? ' · never correct only' : '');
    $('resultsMeta').className = 'results-meta on';

    const max = rows.length > 0 ? rows[0].instances : 1;

    $('tbody').innerHTML = rows.length === 0
      ? `<tr><td colspan="3" class="empty">No results found.</td></tr>`
      : rows.map(({ music_id, instances }, i) => `
          <tr>
            <td class="rank">${i + 1}</td>
            <td class="mid">${music_id}</td>
            <td class="count">
              <div class="bar-wrap">
                ${instances}
                <div class="bar" style="width:${Math.round((instances / max) * 60)}px"></div>
              </div>
            </td>
          </tr>`
        ).join('');

    $('resultsCard').style.display = 'block';
    setStatus(`Done.`, 'ok');
  }

  $('playerId').addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });
</script>
</body>
</html>
